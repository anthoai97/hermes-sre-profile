{{- if and .Values.config.enabled (not .Values.config.existingConfigMap) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hermes-agent.configMapName" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
data:
  {{ .Values.config.fileName }}: |-
    {{- if .Values.config.raw }}
    {{- tpl .Values.config.raw . | nindent 4 }}
    {{- else }}
    {{- toYaml .Values.config.data | nindent 4 }}
    {{- end }}
{{- end }}
