services:
  hermes:
    image: hermes-agent:latest
    container_name: hermes-sre
    restart: unless-stopped
    command:
      - --profile
      - sre-agent
      - gateway
      - run
    env_file:
      - .env
    environment:
      KUBERNETES_MCP_URL: ${KUBERNETES_MCP_URL:-http://host.docker.internal:3001/mcp}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./hermes_data:/opt/data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
