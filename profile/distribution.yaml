name: sre-agent
version: 0.1.0
description: "SRE/DevOps support agent for answering developer questions about service health, deployments, and platform state"
hermes_requires: ">=0.12.0"
author: "Andy Quach"
license: "MIT"
env_requires:
  - name: MCP_AUTH_TOKEN
    description: "Auth token for the readonly Kubernetes MCP server"
    required: true
  - name: KUBERNETES_MCP_URL
    description: "Readonly Kubernetes MCP HTTP endpoint"
    required: true
distribution_owned:
  - SOUL.md
  - config.yaml
  - skills/
  - distribution.yaml
