apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermes-agent.fullname" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hermes-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if and .Values.config.enabled (not .Values.config.existingConfigMap) }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "hermes-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "hermes-agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.config.enabled .Values.kubectl.enabled }}
      initContainers:
        {{- if .Values.kubectl.enabled }}
        - name: install-kubectl
          image: "{{ .Values.kubectl.image.repository }}:{{ .Values.kubectl.image.tag }}"
          imagePullPolicy: {{ .Values.kubectl.image.pullPolicy }}
          {{- with .Values.kubectl.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - sh
            - -ec
            - |
              set -eu
              url="https://dl.k8s.io/release/{{ .Values.kubectl.version }}/bin/linux/{{ .Values.kubectl.arch }}/kubectl"
              curl -L "$url" -o /kubectl-bin/kubectl
              {{- if .Values.kubectl.verifyChecksum }}
              curl -L "${url}.sha256" -o /kubectl-bin/kubectl.sha256
              echo "$(cat /kubectl-bin/kubectl.sha256)  /kubectl-bin/kubectl" | sha256sum -c -
              {{- end }}
              chmod 0755 /kubectl-bin/kubectl
          volumeMounts:
            - name: kubectl-bin
              mountPath: /kubectl-bin
        {{- end }}
        {{- if .Values.config.enabled }}
        - name: bootstrap-hermes-home
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              mkdir -p "{{ .Values.hermesHome }}"
              {{- if .Values.config.enabled }}
              cp "/bootstrap/config/{{ .Values.config.fileName }}" "{{ .Values.hermesHome }}/config.yaml"
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.hermesHome }}
            {{- if .Values.config.enabled }}
            - name: hermes-config
              mountPath: /bootstrap/config
              readOnly: true
            {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "hermes-agent.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            {{- if .Values.profile.name }}
            - --profile
            - {{ .Values.profile.name | quote }}
            {{- end }}
            {{- toYaml .Values.args | nindent 12 }}
          env:
            - name: HERMES_DASHBOARD
              value: {{ ternary "1" "0" .Values.dashboard.enabled | quote }}
            - name: HERMES_DASHBOARD_INSECURE
              value: {{ ternary "1" "0" .Values.dashboard.insecure | quote }}
            - name: HERMES_HOME
              value: {{ .Values.hermesHome | quote }}
            {{- if .Values.kubectl.enabled }}
            - name: PATH
              value: "{{ .Values.kubectl.installPath }}:/usr/local/bin:/usr/bin:/bin"
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (include "hermes-agent.needsDataVolume" .) .Values.kubectl.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if include "hermes-agent.needsDataVolume" . }}
            - name: data
              mountPath: {{ .Values.hermesHome }}
            {{- end }}
            {{- if .Values.kubectl.enabled }}
            - name: kubectl-bin
              mountPath: {{ .Values.kubectl.installPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or (include "hermes-agent.needsDataVolume" .) .Values.kubectl.enabled .Values.extraVolumes }}
      volumes:
        {{- if include "hermes-agent.needsDataVolume" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes-agent.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if .Values.kubectl.enabled }}
        - name: kubectl-bin
          emptyDir: {}
        {{- end }}
        {{- if .Values.config.enabled }}
        - name: hermes-config
          configMap:
            name: {{ include "hermes-agent.configMapName" . }}
            items:
              - key: {{ .Values.config.fileName }}
                path: {{ .Values.config.fileName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
