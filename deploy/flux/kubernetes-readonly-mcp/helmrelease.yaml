apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-server-kubernetes
  namespace: hermes-sre
spec:
  interval: 5m
  releaseName: mcp-server-kubernetes
  targetNamespace: hermes-sre
  chart:
    spec:
      chart: ./helm-chart
      sourceRef:
        kind: GitRepository
        name: mcp-server-kubernetes
        namespace: hermes-sre
      interval: 1m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: flux159/mcp-server-kubernetes
      pullPolicy: IfNotPresent
      tag: v3.8.0
    transport:
      mode: http
      service:
        type: ClusterIP
        port: 3001
        targetPort: 3001
    kubeconfig:
      provider: serviceaccount
    security:
      allowOnlyNonDestructive: true
      allowOnlyReadonly: true
      allowedTools: ""
      podSecurityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
    serviceAccount:
      create: true
      automount: true
    rbac:
      create: true
      useLegacyRules: false
      rules:
        - apiGroups: [""]
          resources: ["pods", "services", "endpoints", "persistentvolumeclaims", "namespaces", "nodes"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods/log"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["apps"]
          resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["batch"]
          resources: ["jobs", "cronjobs"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["networkpolicies", "ingresses"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["rbac.authorization.k8s.io"]
          resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["metrics.k8s.io"]
          resources: ["pods", "nodes"]
          verbs: ["get", "list"]
        - apiGroups: ["apiextensions.k8s.io"]
          resources: ["customresourcedefinitions"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["get", "list", "watch"]
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    env:
      DNS_REBINDING_ALLOWED_HOST: mcp-server-kubernetes.hermes-sre.svc.cluster.local:3001
  valuesFrom:
    - kind: Secret
      name: hermes-mcp-auth
      valuesKey: mcpAuthToken
      targetPath: env.MCP_AUTH_TOKEN
