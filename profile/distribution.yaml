name: sre-agent
version: 0.1.0
description: "SRE/DevOps support agent for simple readonly Kubernetes service checks"
hermes_requires: ">=0.12.0"
author: "Andy Quach"
license: "MIT"
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key for model access"
    required: true
  - name: TELEGRAM_BOT_TOKEN
    description: "Telegram bot token for gateway access"
    required: false
  - name: TELEGRAM_ALLOWED_USERS
    description: "Comma-separated Telegram user IDs allowed to access the gateway"
    required: false
  - name: MCP_AUTH_TOKEN
    description: "Auth token for the readonly Kubernetes MCP server"
    required: true
  - name: KUBERNETES_MCP_URL
    description: "Readonly Kubernetes MCP HTTP endpoint"
    required: true
distribution_owned:
  - SOUL.md
  - config.yaml
  - skills/
  - distribution.yaml
