model:
  provider: openrouter
  model: openai/gpt-oss-120b:free

fallback_providers:
  - provider: openai-codex
    model: gpt-5-codex
  - provider: custom:llmcpp
    model: "${LOCAL_LLM_MODEL}"

custom_providers:
  - name: llmcpp
    base_url: "${LOCAL_LLM_BASE_URL}"
    api_mode: chat_completions
    # api_key omitted: Hermes treats keyless local servers as no-key-required.

toolsets:
  - terminal

platform_toolsets:
  telegram:
    - skills
    - terminal
    - vision
    - messaging
  slack:
    - terminal

agent:
  max_turns: 90
  disabled_toolsets: []

terminal:
  backend: local
  cwd: "."
  timeout: 180
  env_passthrough: []

compression:
  enabled: true

memory:
  memory_enabled: false
  user_profile_enabled: false

skills:
  creation_nudge_interval: 0
  external_dirs: []
  template_vars: true
  inline_shell: false
  guard_agent_created: true

curator:
  enabled: false

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
  destructive_slash_confirm: false
  mcp_reload_confirm: true

telegram:
  allowed_chats: ""

slack:
  require_mention: true
  allowed_channels: ""

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

openrouter:
  response_cache: true
  response_cache_ttl: 300
  min_coding_score: 0.65
