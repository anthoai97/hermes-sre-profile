model:
  provider: openrouter
  default: openai/gpt-oss-120b:free
  base_url: ""
providers: {}
fallback_providers: []

toolsets:
  - skills
  - mcp-kubernetes-readonly

mcp_servers:
  kubernetes-readonly:
    url: "${KUBERNETES_MCP_URL}"
    headers:
      X-MCP-AUTH: "${MCP_AUTH_TOKEN}"
      Host: "mcp-server-kubernetes.hermes-sre.svc.cluster.local:3001"
    enabled: true
    timeout: 120
    connect_timeout: 60
    supports_parallel_tool_calls: false
    tools:
      include:
        - kubectl_get
        - kubectl_describe
        - kubectl_logs
        - kubectl_context
        - explain_resource
        - list_api_resources
        - ping
      resources: false
      prompts: false

platform_toolsets:
  cli:
    - skills
    - mcp-kubernetes-readonly
  telegram:
    - skills
    - mcp-kubernetes-readonly
    - vision
    - messaging
  slack:
    - skills
    - mcp-kubernetes-readonly

agent:
  max_turns: 40
  verbose: true
  disabled_toolsets:
    - browser
    - code_execution
    - cronjob
    - delegation
    - file
    - image_gen
    - kanban
    - memory
    - moa
    - session_search
    - skills_hub
    - terminal
    - tts
    - web

compression:
  enabled: true
  threshold: 0.50

display:
  tool_progress: all
  tool_progress_command: false
  platforms:
    slack:
      tool_progress: "off"
    telegram:
      tool_progress: verbose
  interim_assistant_messages: true

session_reset:
  mode: idle
  idle_minutes: 1440

memory:
  memory_enabled: false
  user_profile_enabled: false

skills:
  creation_nudge_interval: 0
  external_dirs: []
  template_vars: true
  inline_shell: false
  guard_agent_created: true

curator:
  enabled: false

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
  destructive_slash_confirm: false
  mcp_reload_confirm: true

telegram:
  allowed_chats: ""

gateway:
  platforms:
    telegram:
      extra:
        allow_admin_from:
          - "__no_admins__"
        user_allowed_commands:
          - start
          - new
          - reset
          - sethome
          - set_home
          - usage
          - security_verify
          - kubernetes_service_check
        group_allow_admin_from:
          - "__no_group_admins__"
        group_user_allowed_commands:
          - start
          - new
          - reset
          - sethome
          - set_home
          - usage
          - security_verify
          - kubernetes_service_check
    slack:
      extra:
        allow_admin_from:
          - "__no_admins__"
        user_allowed_commands:
          - start
          - new
          - reset
          - sethome
          - set_home
          - usage
          - security_verify
          - kubernetes_service_check
        group_allow_admin_from:
          - "__no_group_admins__"
        group_user_allowed_commands:
          - start
          - new
          - reset
          - sethome
          - set_home
          - usage
          - security_verify
          - kubernetes_service_check

slack:
  require_mention: true
  strict_mention: false
  unauthorized_dm_behavior: "ignore"
  allowed_channels: ""

tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5

openrouter:
  response_cache: true
  response_cache_ttl: 300
  min_coding_score: 0.65
